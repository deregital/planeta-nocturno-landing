sectionLabel: 'Cómo funciona'
heading: 'De la idea al ingreso en 4 pasos'
steps:
  - number: '01'
    title: 'Nos reunimos'
    description: 'Organizamos una reunión con vos para entender tu negocio y configuramos el sistema para tu establecimiento.'
  - number: '02'
    title: 'Armá tu evento'
    description: 'Definí fecha, lugar, tipos de entrada y precios en minutos.'
  - number: '03'
    title: 'Compartí el link'
    description: 'Tus organizadores y redes sociales hacen el resto. Las ventas entran directo a tu cuenta.'
  - number: '04'
    title: 'Controlá el ingreso'
    description: 'El evento: escaneá QR desde el celular y listo.'
