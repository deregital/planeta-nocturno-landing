sectionLabel: 'Administrador, jefes de organizadores y organizadores'
headingLine1: 'Pensado con quienes organizan,'
headingLine2: 'construido para que funcione.'
leftTitle: 'Entendemos cómo funciona el negocio de los organizadores.'
leftDescription: 'No es solo vender entradas. Es armar equipo, medir resultados y que cada organizador tenga las herramientas para laburar bien. Construimos cada pantalla pensando en cómo trabaja un organizador de verdad.'
roleCards:
  - role: 'Administrador'
    tagline: 'Visión completa del sistema'
    features:
      - 'Control total de usuarios, roles y permisos'
      - 'Acceso a la base de datos completa de asistentes'
      - 'Configuración de tipos de entrada y precios'
      - 'Seguimiento de ventas y escaneos en tiempo real'
      - 'Gestión centralizada de todos los eventos activos'
  - role: 'Jefe de Organizadores'
    tagline: 'Coordiná tu equipo'
    features:
      - 'Panel con el rendimiento de cada organizador'
      - 'Vista consolidada de invitados de todo el equipo'
      - 'Historial de eventos y resultados del equipo'
      - 'Acceso directo a reportes en Google Drive'
      - 'Acceso directo a Mercado Pago'
  - role: 'Organizador'
    tagline: 'Tu lista, tus números, tu link'
    features:
      - 'Link propio para compartir en redes y grupos'
      - 'Lista de invitados en tiempo real'
      - 'Contactar invitados con un click (WhatsApp, teléfono)'
      - 'Ver estado de cada entrada'
highlights:
  - title: 'Cada organizador tiene su link único'
    description: 'Cuando alguien compra por ese link, sabés exactamente quién la trajo. Sin discusiones, sin planillas.'
  - title: 'Invitados en tiempo real'
    description: 'El organizador ve su lista actualizándose al instante. Puede contactar a cualquier invitado con un toque.'
  - title: 'Jerarquía que funciona'
    description: 'Administrador, Jefe de Organizadores, Organizador, Acceso. Cada rol ve exactamente lo que necesita, nada más.'
